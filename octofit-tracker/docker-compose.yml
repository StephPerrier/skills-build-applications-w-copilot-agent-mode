version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: octofit-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: octofit-tracker
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok'
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
